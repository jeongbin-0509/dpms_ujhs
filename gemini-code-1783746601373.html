<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도주 게임 (Evade Game)</title>
    <style>
        body {
            margin: 0;
            background-color: #222;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            background-color: #111;
            border: 4px solid #fff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }
        #score {
            font-size: 24px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div id="score">버틴 시간: 0초</div>
    <canvas id="gameCanvas" width="600" height="400"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        // 게임 상태
        let gameOver = false;
        let startTime = Date.now();
        let score = 0;

        // 플레이어 설정
        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            size: 20,
            speed: 5,
            color: "#00ffcc"
        };

        // 적 설정
        const enemies = [];
        const enemySpawnInterval = 1000; // 1초마다 적 생성
        let lastSpawnTime = 0;

        // 키보드 입력 상태
        const keys = {};

        window.addEventListener("keydown", (e) => keys[e.key] = true);
        window.addEventListener("keyup", (e) => keys[e.key] = false);

        // 적 생성 함수
        function spawnEnemy() {
            const size = Math.random() * 15 + 10; // 크기 랜덤
            let x, y;

            // 화면 외각 4면 중 한 곳에서 등장
            if (Math.random() < 0.5) {
                x = Math.random() < 0.5 ? 0 - size : canvas.width + size;
                y = Math.random() * canvas.height;
            } else {
                x = Math.random() * canvas.width;
                y = Math.random() < 0.5 ? 0 - size : canvas.height + size;
            }

            // 플레이어 방향으로 속도 계산
            const angle = Math.atan2(player.y - y, player.x - x);
            const speed = Math.random() * 2 + 2; // 속도 랜덤

            enemies.push({
                x: x,
                y: y,
                size: size,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                color: "#ff3366"
            });
        }

        // 충돌 체크 함수
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.size &&
                   rect1.x + rect1.size > rect2.x &&
                   rect1.y < rect2.y + rect2.size &&
                   rect1.y + rect1.size > rect2.y;
        }

        // 게임 루프
        function gameLoop(timestamp) {
            if (gameOver) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.font = "30px sans-serif";
                ctx.fillText("게임 오버! F5를 눌러 재시작", canvas.width / 2 - 170, canvas.height / 2);
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 시간 점수 계산
            score = Math.floor((Date.now() - startTime) / 1000);
            scoreElement.innerText = `버틴 시간: ${score}초`;

            // 플레이어 이동 제한 및 처리
            if ((keys["ArrowUp"] || keys["w"]) && player.y > 0) player.y -= player.speed;
            if ((keys["ArrowDown"] || keys["s"]) && player.y < canvas.height - player.size) player.y += player.speed;
            if ((keys["ArrowLeft"] || keys["a"]) && player.x > 0) player.x -= player.speed;
            if ((keys["ArrowRight"] || keys["d"]) && player.x < canvas.width - player.size) player.x += player.speed;

            // 플레이어 그리기
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.size, player.size);

            // 일정 시간마다 적 스폰
            if (timestamp - lastSpawnTime > enemySpawnInterval) {
                spawnEnemy();
                lastSpawnTime = timestamp;
            }

            // 적 업데이트 및 그리기
            for (let i = enemies.length - 1; i >= 0; i--) {
                const enemy = enemies[i];
                enemy.x += enemy.vx;
                enemy.y += enemy.vy;

                ctx.fillStyle = enemy.color;
                ctx.fillRect(enemy.x, enemy.y, enemy.size, enemy.size);

                // 충돌 검사
                if (checkCollision(player, enemy)) {
                    gameOver = true;
                }

                // 화면 밖으로 나간 적 제거
                if (enemy.x < -50 || enemy.x > canvas.width + 50 || enemy.y < -50 || enemy.y > canvas.height + 50) {
                    enemies.splice(i, 1);
                }
            }

            requestAnimationFrame(gameLoop);
        }

        // 게임 시작
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
