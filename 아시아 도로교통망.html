```html
<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>
Asia Real Traffic Simulator
</title>


<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"
/>


<style>

body{

background:#111;
color:white;
font-family:Arial;
text-align:center;

}


h1{

margin:20px;

}


select,button,input{

font-size:18px;
padding:8px;

}


#map{

width:90%;
height:700px;
margin:20px auto;

border:2px solid white;

}


.control{

margin:10px;

}

</style>

</head>


<body>


<h1>
🌏 Asia Real Traffic Simulator
</h1>



<div class="control">


<select id="country">


<option value="korea">
🇰🇷 대한민국 (서울)
</option>


<option value="china">
🇨🇳 중국 (베이징)
</option>


<option value="japan">
🇯🇵 일본 (도쿄)
</option>


<option value="russia">
🇷🇺 러시아 (모스크바)
</option>


<option value="india">
🇮🇳 인도 (뉴델리)
</option>


</select>



<button onclick="loadMap()">
지도 불러오기
</button>


</div>



<div class="control">


🚗 차량 대수:


<input

type="range"

id="carCount"

min="0"

max="2000"

value="300"

oninput="updateCarText()"

>


<span id="carText">
300
</span>

대


<button onclick="createCars()">

차량 적용

</button>


</div>



<div id="map"></div>



<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>


<script>


let map;


let roads=[];

let cars=[];


let carLayer=[];



const locations={


korea:{
name:"대한민국",
lat:37.5665,
lon:126.9780
},


china:{
name:"중국",
lat:39.9042,
lon:116.4074
},


japan:{
name:"일본",
lat:35.6762,
lon:139.6503
},


russia:{
name:"러시아",
lat:55.7558,
lon:37.6173
},


india:{
name:"인도",
lat:28.6139,
lon:77.2090
}


};





function loadMap(){



let country=
document.getElementById("country").value;


let loc=
locations[country];



if(map){

map.remove();

}



map=

L.map("map")
.setView(
[
loc.lat,
loc.lon
],
12
);



L.tileLayer(

"https://tile.openstreetmap.org/{z}/{x}/{y}.png",

{

maxZoom:19

}

).addTo(map);



loadRoads(
loc.lat,
loc.lon
);



}





async function loadRoads(lat,lon){



roads=[];



let query=

`

[out:json];

way

(around:5000,

${lat},

${lon}

)

[highway];

out geom;

`;



let url=

"https://overpass-api.de/api/interpreter?data="

+

encodeURIComponent(query);



let response=

await fetch(url);



let data=

await response.json();




data.elements.forEach(r=>{


if(r.geometry){


roads.push(

r.geometry.map(

p=>[

p.lat,

p.lon

]

)

);


}


});



drawRoads();


createCars();



}




function drawRoads(){



roads.forEach(r=>{


L.polyline(

r,

{

color:"lime",

weight:5,

opacity:0.7

}

)

.addTo(map);


});


}







function createCars(){


cars=[];



carLayer.forEach(

c=>map.removeLayer(c)

);



carLayer=[];



let count=

Number(

document.getElementById("carCount").value

);




for(let i=0;i<count;i++){



let road=

roads[

Math.floor(

Math.random()*roads.length

)

];



let marker=

L.circleMarker(

road[0],

{


radius:4,

color:"red",

fillColor:"red"

}

)

.addTo(map);



carLayer.push(marker);



cars.push({

road:road,

pos:0,

speed:

Math.random()*0.5+0.1,

marker:marker

});



}



}






function moveCars(){



cars.forEach(c=>{


c.pos+=c.speed/100;



if(c.pos>=c.road.length)

c.pos=0;



let p=

c.road[

Math.floor(c.pos)

];



if(p)

c.marker.setLatLng(p);



});



setTimeout(

moveCars,

100

);



}




function updateCarText(){


document.getElementById("carText")
.innerHTML=

document.getElementById("carCount")
.value;


}





moveCars();



</script>


</body>

</html>
